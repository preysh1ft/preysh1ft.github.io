<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missed Calls - preysh1ft</title>
<meta name="theme-color" content="#0a0a0a">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    width: 100%;
    font-family: 'Helvetica Neue', sans-serif;
    color: #fff;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: -20%;
    left: -20%;
    width: 140%;
    height: 140%;
    background: url('cover.png') center/cover no-repeat;
    filter: blur(40px) brightness(0.3);
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90%;
    max-width: 600px;
  }

  /* Fade-in animácia */
  .fade-in {
    opacity: 0;
    animation: fadeIn 1s ease forwards;
  }

  .fade-in.delay-1 {
    animation-delay: 0.3s;
  }
  .fade-in.delay-2 {
    animation-delay: 0.6s;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }

  .out-now {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    font-weight: 900;
    color: #FE0000;
    text-align: center;
    margin-bottom: 1rem;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }

  .cover {
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    margin-bottom: 1.5rem;
  }

  .title {
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: bold;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .artist {
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 300;
    margin-bottom: 2rem;
    text-align: center;
    opacity: 0.8;
  }

  .platforms {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .platforms a img {
    width: 40px;
    height: 40px;
    transition: transform 0.2s, filter 0.2s;
  }

  .platforms a img:hover {
    transform: scale(1.1);
    filter: brightness(1.2);
  }

  @media (max-width: 480px) {
    .platforms a img {
      width: 35px;
      height: 35px;
    }
  }

  @media (max-width: 360px) {
    .out-now {
      font-size: 1.5rem;
    }
    .title {
      font-size: 1.4rem;
    }
    .artist {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<div class="content">
  <!-- OUT NOW -->
  <div class="out-now fade-in delay-1">OUT NOW</div>

  <!-- Cover -->
  <img src="cover.png" alt="Missed Calls Cover" class="cover fade-in delay-2">

  <!-- Text -->
  <div class="title fade-in delay-2">Missed Calls</div>
  <div class="artist fade-in delay-2">preysh1ft</div>

  <!-- Platforms -->
  <div class="platforms fade-in delay-2">
    <a href="https://open.spotify.com/track/0fyammimsjhzCLgUfBBC4E?si=66fa33277485444e" target="_blank"><img src="icons/spotify.png" alt="Spotify"></a>
    <a href="https://music.apple.com/sk/album/missed-calls-single/1872872321?l=sk" target="_blank"><img src="icons/apple-music.png" alt="Apple Music"></a>
    <a href="https://youtu.be/_cUgMYOguDw?si=9J_JpjMNjrJBCZgq" target="_blank"><img src="icons/youtube.png" alt="YouTube"></a>
    <a href="https://link.deezer.com/s/32xzq6ZJUjKMfVgO7rYtu" target="_blank"><img src="icons/deezer.png" alt="Deezer"></a>
    <a href="https://tidal.com/track/494056447/u" target="_blank"><img src="icons/tidal.webp" alt="Tidal"></a>
  </div>
</div>

</body>
</html>
